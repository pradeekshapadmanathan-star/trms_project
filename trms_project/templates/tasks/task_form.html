{% extends "base.html" %}
{% block page_title %}Add Task{% endblock %}
{% block page_subtitle %}Create a new daily work tracker entry{% endblock %}
{% block content %}
<div class="card dashboard-card">
    <div class="card-body p-4">
        <div class="section-heading mb-4">
            <div>
                <h3 class="section-title">Add Daily Tracker Entry</h3>
                <p class="section-subtitle mb-0">Submit hours, task type, and status details</p>
            </div>
        </div>
        <form method="post" class="app-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary">Save Task</button>
        </form>
    </div>
</div>
{% endblock %}
