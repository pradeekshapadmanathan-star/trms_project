{% extends "base.html" %}
{% block page_title %}Delete Holiday{% endblock %}
{% block page_subtitle %}Remove the selected holiday from the shared calendar{% endblock %}
{% block content %}
<div class="card dashboard-card">
    <div class="card-body p-4">
        <h3 class="section-title mb-2">Delete holiday?</h3>
        <p class="section-subtitle mb-4">{{ holiday.date }} | {{ holiday.description }}</p>
        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger">Confirm Delete</button>
        </form>
    </div>
</div>
{% endblock %}
