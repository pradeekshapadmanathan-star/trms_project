services:
  - type: web
    name: hcl-trms
    runtime: python
    rootDir: trms_project
    buildCommand: bash build.sh
    startCommand: gunicorn trms_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hcl-trms-db
          property: connectionString

databases:
  - name: hcl-trms-db
    databaseName: hcl_trms
    user: hcl_trms
